<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Live Cricket</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:#000;overflow:hidden;font-family:-apple-system,Helvetica,sans-serif}
#wrap{position:relative;width:100vw;height:100vh}

#gate{position:absolute;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;cursor:pointer;gap:18px}
#gate-btn{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 8px rgba(255,255,255,.08);transition:transform .15s}
#gate:hover #gate-btn{transform:scale(1.08)}
#gate-btn svg{width:30px;height:30px;margin-left:4px}
#match-title{color:rgba(255,255,255,.75);font-size:14px;font-weight:500;letter-spacing:.3px;text-align:center;padding:0 24px}
#gate-sub{color:rgba(255,255,255,.35);font-size:11px;letter-spacing:.5px;text-transform:uppercase}

#spinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:65px;height:65px;border-radius:50%;border:5px solid rgba(255,255,255,.15);border-top-color:lightblue;display:none;z-index:15;animation:spin .8s linear infinite}
#spinner.on{display:block}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

#err{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:14px;text-align:center;display:none;z-index:30;padding:20px;line-height:1.8;cursor:pointer;background:rgba(0,0,0,.6);border-radius:12px}
#err.on{display:block}

#stream-frame{width:100%;height:100%;border:none;display:none;position:absolute;inset:0;z-index:5}
</style>
</head>
<body>
<div id="wrap">

  <iframe id="stream-frame" allowfullscreen scrolling="no" allowtransparency allow="autoplay; fullscreen"></iframe>

  <div id="gate">
    <div id="gate-btn">
      <svg viewBox="0 0 24 24" fill="#111"><polygon points="6,4 20,12 6,20"/></svg>
    </div>
    <div id="match-title">Loading match...</div>
    <div id="gate-sub">Tap to watch live</div>
  </div>

  <div id="spinner"></div>
  <div id="err">⚠️ Stream unavailable.<br><span style="font-size:12px;opacity:.6">Tap to retry</span></div>

</div>

<script>
const AD_LINK = "https://www.effectivecpmnetwork.com/zf2t6d5h?key=672b8fd8d1cc28fa982c9a09616e9ba6";

const gate = document.getElementById('gate');
const spinner = document.getElementById('spinner');
const errEl = document.getElementById('err');
const frame = document.getElementById('stream-frame');
const titleEl = document.getElementById('match-title');

function showError(msg = '⚠️ Stream unavailable.') {
    spinner.classList.remove('on');
    errEl.innerHTML = `${msg}<br><span style="font-size:12px;opacity:.6">Tap to retry</span>`;
    errEl.classList.add('on');
}

async function fetchLiveMatch() {
    const controller = new AbortController();

    const timeout = setTimeout(() => {
        controller.abort();
    }, 10000);

    try {
        const res = await fetch(
            'https://streamed.pk/api/matches/cricket',
            {
                cache: 'no-store',
                signal: controller.signal
            }
        );

        clearTimeout(timeout);

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        const matches = await res.json();

        if (!Array.isArray(matches) || !matches.length) {
            throw new Error('No matches');
        }

        return (
            matches.find(
                m => m.sources?.some(
                    s => s.source === 'admin'
                )
            ) || matches[0]
        );

    } catch (err) {
        clearTimeout(timeout);
        throw err;
    }
}

(async function loadTitle() {
    try {
        const match = await fetchLiveMatch();

        if (match?.title) {
            titleEl.textContent = '🏏 ' + match.title;
        } else {
            titleEl.textContent = 'Cricket Live Stream';
        }
    } catch {
        titleEl.textContent = 'Cricket Live Stream';
    }
})();

gate.addEventListener('click', async () => {

    const adWindow = window.open(AD_LINK, '_blank');

    if (!adWindow) {
        console.log('Popup blocked');
    }

    gate.style.display = 'none';
    errEl.classList.remove('on');
    spinner.classList.add('on');

    try {

        const match = await fetchLiveMatch();

        if (!match) {
            throw new Error('No live match');
        }

        const admin = match.sources?.find(
            s => s.source === 'admin'
        );

        if (!admin?.id) {
            throw new Error('No admin source');
        }

        frame.style.display = 'block';

        frame.onload = () => {
            spinner.classList.remove('on');
        };

        frame.onerror = () => {
            showError();
        };

        frame.src = `https://embed.st/embed/admin/${admin.id}/1`;

        setTimeout(() => {
            spinner.classList.remove('on');
        }, 8000);

        setTimeout(() => {
            if (spinner.classList.contains('on')) {
                showError('⚠️ Stream loading timeout.');
            }
        }, 15000);

    } catch (error) {

        console.error(error);

        showError(
            navigator.onLine
                ? '⚠️ Stream unavailable.'
                : '⚠️ No internet connection.'
        );
    }
});

errEl.addEventListener('click', () => {

    errEl.classList.remove('on');

    frame.src = '';
    frame.style.display = 'none';

    gate.style.display = 'flex';
});
</script>

</body>
</html>
